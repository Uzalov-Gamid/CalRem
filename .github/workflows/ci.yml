name: Build and Test

on:
  push:
    branches:
      - main
      - "feature/**"
      - "chore/**"
      - "fix/**"
      - "test/**"
      - "docs/**"
  pull_request:
    branches:
      - main

jobs:
  macos:
    name: macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Test
        run: xcodebuild test -project CalRem.xcodeproj -scheme CalRem -destination 'platform=macOS' CODE_SIGNING_ALLOWED=NO
